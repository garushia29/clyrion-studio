services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: clyrion_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      # Source code directories (bind mount from Windows for live editing)
      - ./src/app:/var/www/app
      - ./src/bootstrap:/var/www/bootstrap
      - ./src/config:/var/www/config
      - ./src/database:/var/www/database
      - ./src/lang:/var/www/lang
      - ./src/public:/var/www/public
      - ./src/resources:/var/www/resources
      - ./src/routes:/var/www/routes
      - ./src/storage:/var/www/storage
      - ./src/tests:/var/www/tests
      # Config & entrypoint files
      - ./src/.env:/var/www/.env
      - ./src/composer.json:/var/www/composer.json
      - ./src/composer.lock:/var/www/composer.lock
      - ./src/artisan:/var/www/artisan
      - ./src/package.json:/var/www/package.json
      - ./src/package-lock.json:/var/www/package-lock.json
      - ./src/vite.config.js:/var/www/vite.config.js
      - ./src/tailwind.config.js:/var/www/tailwind.config.js
      - ./src/postcss.config.js:/var/www/postcss.config.js
      - ./src/phpunit.xml:/var/www/phpunit.xml
      # Named volume for vendor (fast container-native filesystem, NOT Windows bind mount)
      - clyrion_vendor:/var/www/vendor
    ports:
      - "5173:5173"
    networks:
      - clyrion_network

  nginx:
    image: nginx:alpine
    container_name: clyrion_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./src/public:/var/www/public
      - ./src/storage/app/public:/var/www/storage
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - clyrion_network

  postgres:
    image: postgres:16
    container_name: clyrion_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: clyrion_db
      POSTGRES_USER: clyrion_user
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - clyrion_network

networks:
  clyrion_network:

volumes:
  postgres_data:
  clyrion_vendor: