services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    container_name: clyrion_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./src/storage:/var/www/storage
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-clyrion_db}
      - DB_USERNAME=${DB_USERNAME:-clyrion_user}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
    env_file:
      - .env
    networks:
      - clyrion_network
    healthcheck:
      test: ["CMD", "php", "-v"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: clyrion_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./src/public:/var/www/public
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/prod.conf
      - ./storage/ssl:/etc/nginx/ssl:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - clyrion_network

  postgres:
    image: postgres:16-alpine
    container_name: clyrion_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-clyrion_db}
      POSTGRES_USER: ${DB_USERNAME:-clyrion_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - clyrion_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-clyrion_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  clyrion_network:

volumes:
  postgres_data:
